<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>直播录制助手</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2EC;--card:#FCFAF7;--text:#1F1B16;--text2:#8A8278;--text3:#BFB8AD;
  --border:#E6E0D6;--accent:#2C2416;--accent-bg:#F0EBE2;
  --live:#3D7252;--danger:#C5463A;--warn:#D4893A;
  --radius:4px;--font-display:'Songti SC','STSong',serif;--font-ui:system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#11100E;--card:#1C1A17;--text:#E8E3D9;--text2:#9E978C;--text3:#5F5A52;--border:#2C2924;--accent:#C4A97D;--accent-bg:#262218;}
}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);padding:24px;max-width:520px;margin:0 auto;min-height:100vh}
h1{font-family:var(--font-display);font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-0.01em}
.subtitle{font-size:11px;color:var(--text3);margin-bottom:20px}
.section-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:24px 0 10px}
.section-label::before{content:'';display:block;width:16px;height:1px;background:var(--text3);margin-bottom:8px}

/* Header */
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.header-btns{display:flex;gap:6px}
.btn{padding:7px 16px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.03em;font-family:var(--font-ui);transition:all .15s}
.btn:active{background:var(--border)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}

/* Add row */
.add-row{display:flex;gap:8px;margin-bottom:16px}
.add-row input{flex:1;padding:12px 14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:var(--font-ui);outline:none}
.add-row input:focus{border-color:var(--text)}

/* Cards */
.live-card,.offline-card{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:6px}
.live-card{border-left:3px solid var(--live)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.card-name{font-weight:700;font-size:16px}
.badge{padding:2px 10px;font-size:10px;font-weight:600;letter-spacing:0.04em}
.badge-live{background:var(--live);color:#fff}
.badge-off{color:var(--text3);border:1px solid var(--border)}
.card-meta{font-size:11px;color:var(--text2);margin-bottom:8px}
.card-actions{display:flex;gap:6px}
.btn-sm{padding:4px 12px;font-size:10px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-ui)}
.btn-sm.danger{color:var(--danger);border-color:var(--danger)}
.progress-line{height:2px;background:var(--live);margin-top:10px;transition:width 1s linear}

/* Recording list */
.file-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.file-name{font-weight:600;font-size:13px}
.file-meta{font-size:10px;color:var(--text3);margin-top:2px}
.file-size{font-size:12px;color:var(--text2);white-space:nowrap}

/* Settings */
.settings-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.settings-row label{font-size:13px;color:var(--text2);flex-shrink:0}
.settings-row input{flex:1;padding:10px 12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;font-family:var(--font-ui);outline:none}
.settings-row input:focus{border-color:var(--text)}

.card-recordings{margin-top:12px;border-top:1px solid var(--border);padding-top:10px}
.card-rec-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.rec-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:11px}
.rec-item+.rec-item{border-top:1px solid var(--border)}
.rec-name{font-weight:500;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-info{font-size:10px;color:var(--text3);margin-top:1px}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:8px 24px;font-size:12px;font-weight:500;z-index:100;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.hl-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;cursor:pointer}
.hl-item.selected{background:var(--accent-bg);margin:0 -8px;padding-left:8px;padding-right:8px}
.hl-check{flex-shrink:0;accent-color:var(--text)}
.hl-info{flex:1;min-width:0}
.hl-title{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.hl-meta{font-size:10px;color:var(--text3);margin-top:2px}
.hl-score{font-size:11px;font-weight:700;flex-shrink:0;text-align:center;min-width:36px}
.hl-score.hot{color:#E8860C}
.hl-score.wild{color:var(--danger)}
.tag{display:inline-block;padding:1px 6px;font-size:9px;font-weight:600;border-radius:2px;margin-right:3px}
.tag-danmaku{background:#E8D5F5;color:#6B3FA0}
.tag-gift{background:#FDE4C3;color:#A05B0A}
.tag-audio{background:#D6ECFB;color:#2A6B9E}
.tag-guard{background:#FDDEDE;color:#B52828}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>直播录制助手</h1>
    <div class="subtitle" id="clock">加载中...</div>
  </div>
  <div class="header-btns">
    <button class="btn" id="btnCheck">立即检查</button>
    <button class="btn" id="btnShutdown" style="color:var(--danger);border-color:var(--danger)">关闭服务</button>
  </div>
</div>

<div class="add-row">
  <input type="text" id="roomInput" placeholder="房间号 / live.bilibili.com链接 / b23.tv短链" inputmode="numeric">
  <button class="btn primary" id="btnAdd">添加</button>
</div>

<div class="section-label">监看中</div>
<div id="liveArea"><div style="color:var(--text3);font-size:13px;padding:12px 0">暂无直播中的主播</div></div>

<div class="section-label">离线</div>
<div id="offlineArea"><div style="color:var(--text3);font-size:13px;padding:12px 0">暂无离线主播</div></div>

<div class="section-label" id="orphanedLabel" style="display:none">未归类录像</div>
<div id="orphanedList"></div>

<div class="section-label" id="highlightsLabel" style="display:none">高光切片</div>
<div id="highlightsArea">
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <select id="hlStreamerSelect" onchange="refreshHighlights()" style="padding:6px 10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-family:var(--font-ui)">
      <option value="">选择主播...</option>
    </select>
    <select id="hlDateSelect" onchange="refreshHighlights()" style="padding:6px 10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-family:var(--font-ui)">
      <option value="">今天</option>
    </select>
    <button class="btn-sm" id="btnClipSelected" onclick="clipSelected()" disabled>裁剪选中</button>
  </div>
  <div id="highlightsList"></div>
</div>

<div class="section-label">设置</div>
<div class="settings-row">
  <label>保存路径</label>
  <input type="text" id="savePathInput">
  <button class="btn-sm" id="btnSavePath">保存</button>
</div>

<script>
const API = {
  async get(path) { const r = await fetch(path); return r.json(); },
  async post(path, body) {
    const r = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    return r.json();
  },
  async del(path) { const r = await fetch(path, { method:'DELETE' }); return r.json(); },
  async put(path, body) {
    const r = await fetch(path, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    return r.json();
  }
};

function formatSize(bytes) {
  if (bytes > 1e9) return (bytes/1e9).toFixed(1)+' GB';
  if (bytes > 1e6) return (bytes/1e6).toFixed(1)+' MB';
  if (bytes > 1e3) return (bytes/1e3).toFixed(0)+' KB';
  return bytes+' B';
}

function formatDuration(sec) {
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  if (h>0) return h+'h'+String(m).padStart(2,'0')+'m';
  return m+'m'+String(s).padStart(2,'0')+'s';
}

function showToast(msg) {
  const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s'},1500);
  setTimeout(()=>t.remove(),2000);
}

async function refresh() {
  const data = await API.get('/api/status');
  const settings = await API.get('/api/settings');
  document.getElementById('savePathInput').value = settings.savePath || '';

  // Group recordings by streamerId
  const recsByStreamer = {};
  for (const r of data.recordings) {
    if (!recsByStreamer[r.streamerId]) recsByStreamer[r.streamerId] = [];
    recsByStreamer[r.streamerId].push(r);
  }

  function recsHTML(recs, streamerId) {
    if (!recs || recs.length === 0) return '';
    const id = 'recs-' + streamerId;
    const latest = recs.slice(0, 10);
    const items = latest.map(r => {
      const fname = r.filename.split('/').pop();
      const fp = r.filePath.replace(/\\/g,'\\\\');
      return `<div class="rec-item">
        <div style="flex:1;min-width:0">
          <div class="rec-name" title="${fname}">${fname}</div>
          <div class="rec-info">${new Date(r.mtime).toLocaleString('zh-CN')} · ${formatSize(r.size)}</div>
        </div>
        <button class="btn-sm" onclick="event.stopPropagation();playFile('${fp}')">▶</button>
        ${r.filename.toLowerCase().endsWith('.flv') ? `<button class="btn-sm" onclick="event.stopPropagation();convertFile('${fp}')" style="margin-left:3px">→MKV</button>` : ''}
        <button class="btn-sm danger" onclick="event.stopPropagation();deleteFile('${fp}')" style="margin-left:3px">✕</button>
      </div>`;
    }).join('');
    return `<div class="card-recordings">
      <div class="card-rec-label" id="label-${id}" onclick="var l=document.getElementById('${id}');var lb=document.getElementById('label-${id}');if(l.style.display==='none'){l.style.display='block';lb.textContent='▼ 录像文件 (${recs.length})'}else{l.style.display='none';lb.textContent='▶ 录像文件 (${recs.length})'}" style="cursor:pointer;user-select:none">▶ 录像文件 (${recs.length})</div>
      <div id="${id}" style="display:none">${items}</div>
    </div>`;
  }

  const liveS = data.streamers.filter(s => s.status==='live');
  const offS = data.streamers.filter(s => s.status==='offline');

  const liveArea = document.getElementById('liveArea');
  if (liveS.length===0) {
    liveArea.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:12px 0">暂无直播中的主播</div>';
  } else {
    liveArea.innerHTML = liveS.map(s => `
      <div class="live-card" id="card-${s.id}">
        <div class="card-top">
          <span class="card-name">${s.name}</span>
          <span class="badge badge-live">直播中</span>
        </div>
        <div class="card-meta">房间 ${s.roomId} · ${s.recording ? '<span style="color:var(--live)">● 录制中</span>' : '<span style="color:var(--warn)">○ 未在录制</span>'} · 画质 <select onchange="changeQuality('${s.id}',this.value)" style="font-size:11px;padding:1px 4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font-ui);cursor:pointer"><option value="auto"${(s.quality||'auto')==='auto'?' selected':''}>原画</option><option value="high"${s.quality==='high'?' selected':''}>高清</option><option value="medium"${s.quality==='medium'?' selected':''}>标清</option><option value="low"${s.quality==='low'?' selected':''}>流畅</option></select> · <select onchange="changeFormat('${s.id}',this.value)" style="font-size:11px;padding:1px 4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font-ui);cursor:pointer"><option value="flv"${(s.format||'flv')==='flv'?' selected':''}>FLV</option><option value="mkv"${s.format==='mkv'?' selected':''}>MKV</option><option value="ts"${s.format==='ts'?' selected':''}>TS</option><option value="mp4"${s.format==='mp4'?' selected':''}>MP4</option></select> <a href="https://live.bilibili.com/${s.roomId}" target="_blank" style="color:var(--text3);text-decoration:none;margin-left:4px" title="打开直播间">↗</a></div>
        ${s.recording ? '<div class="progress-line" style="width:100%"></div>' : ''}
        <div class="card-actions" style="margin-top:8px">
          ${s.recording
            ? '<button class="btn-sm danger" onclick="stopRecord(\''+s.id+'\')">⏹ 停止录制</button>'
            : '<button class="btn-sm" style="color:var(--live);border-color:var(--live)" onclick="startRecord(\''+s.id+'\')">▶ 开始录制</button>'}
          <button class="btn-sm danger" onclick="removeStreamer(\'${s.id}\',\'${s.name.replace(/'/g,"\\'")}\')">删除主播</button>
        </div>
        ${recsHTML(recsByStreamer[s.id], s.id)}
      </div>
    `).join('');
  }

  const offArea = document.getElementById('offlineArea');
  if (offS.length===0) {
    offArea.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:12px 0">暂无离线主播</div>';
  } else {
    offArea.innerHTML = offS.map(s => `
      <div class="offline-card">
        <div class="card-top">
          <span class="card-name">${s.name}</span>
          <span class="badge badge-off">离线</span>
        </div>
        <div class="card-meta">房间 ${s.roomId} · 画质 <select onchange="changeQuality('${s.id}',this.value)" style="font-size:11px;padding:1px 4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font-ui);cursor:pointer"><option value="auto"${(s.quality||'auto')==='auto'?' selected':''}>原画</option><option value="high"${s.quality==='high'?' selected':''}>高清</option><option value="medium"${s.quality==='medium'?' selected':''}>标清</option><option value="low"${s.quality==='low'?' selected':''}>流畅</option></select> · <select onchange="changeFormat('${s.id}',this.value)" style="font-size:11px;padding:1px 4px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--font-ui);cursor:pointer"><option value="flv"${(s.format||'flv')==='flv'?' selected':''}>FLV</option><option value="mkv"${s.format==='mkv'?' selected':''}>MKV</option><option value="ts"${s.format==='ts'?' selected':''}>TS</option><option value="mp4"${s.format==='mp4'?' selected':''}>MP4</option></select> <a href="https://live.bilibili.com/${s.roomId}" target="_blank" style="color:var(--text3);text-decoration:none;margin-left:4px" title="打开直播间">↗</a></div>
        <div class="card-actions" style="margin-top:4px">
          <button class="btn-sm danger" onclick="removeStreamer('${s.id}','${s.name.replace(/'/g,"\\'")}')">删除</button>
        </div>
        ${recsHTML(recsByStreamer[s.id], s.id)}
      </div>
    `).join('');
  }

  // Orphaned recordings (files from deleted streamers)
  const orphanedLabel = document.getElementById('orphanedLabel');
  const orphanedList = document.getElementById('orphanedList');
  if (data.orphaned && data.orphaned.length > 0) {
    orphanedLabel.style.display = '';
    const oItems = data.orphaned.slice(0, 20).map(r => {
      const fname = r.filename.split('/').pop();
      const fp = r.filePath.replace(/\\/g,'\\\\');
      return `<div class="rec-item">
        <div style="flex:1;min-width:0">
          <div class="rec-name" title="${r.filename}">${r.filename}</div>
          <div class="rec-info">${new Date(r.mtime).toLocaleString('zh-CN')} · ${formatSize(r.size)}</div>
        </div>
        <button class="btn-sm" onclick="playFile('${fp}')">▶</button>
        ${r.filename.toLowerCase().endsWith('.flv') ? `<button class="btn-sm" onclick="convertFile('${fp}')" style="margin-left:3px">→MKV</button>` : ''}
        <button class="btn-sm danger" onclick="deleteFile('${fp}')" style="margin-left:3px">✕</button>
      </div>`;
    }).join('');
    orphanedList.innerHTML = `<div id="orphanedBlock" style="display:block">
      <div class="card-rec-label" style="cursor:default">${data.orphaned.length} 个文件</div>
      ${oItems}
    </div>`;
  } else {
    orphanedLabel.style.display = 'none';
    orphanedList.innerHTML = '';
  }

  document.getElementById('clock').textContent = '更新于 '+new Date().toLocaleTimeString('zh-CN');
  if (document.getElementById('hlStreamerSelect').value) refreshHighlights();
}

async function startRecord(id) {
  const r = await API.post('/api/streamer/'+id+'/start');
  if (r.ok) { showToast('录制已开始'); refresh(); }
  else showToast(r.error || '启动失败');
}

async function stopRecord(id) {
  await API.post('/api/streamer/'+id+'/stop');
  showToast('录制已停止');
  refresh();
}

async function playFile(filePath) {
  // MP4 is unplayable while recording — moov atom not written until EOF
  if (filePath.toLowerCase().endsWith('.mp4')) {
    const data = await API.get('/api/status');
    const recording = data.streamers.some(s => s.recording);
    if (recording) {
      showToast('MP4 录制中暂无法播放，录完后可播');
      return;
    }
  }
  const r = await API.post('/api/open-file', { filePath });
  if (r.ok) showToast('已打开播放器');
  else showToast(r.error || '打开失败');
}

async function convertFile(filePath) {
  showToast('正在转换为 MKV...');
  const r = await API.post('/api/convert', { filePath });
  if (r.ok) { showToast('已转换为 MKV！'); refresh(); }
  else showToast(r.error || '转换失败');
}

async function deleteFile(filePath) {
  if (!confirm('确定删除此录制文件？')) return;
  const r = await API.del('/api/recording?filePath=' + encodeURIComponent(filePath));
  if (r.ok) { showToast('已删除'); refresh(); }
  else showToast(r.error || '删除失败');
}

async function changeQuality(id, quality) {
  await API.put('/api/streamer/'+id+'/quality', { quality });
  showToast('画质已切换为 ' + {auto:'原画',high:'高清',medium:'标清',low:'流畅'}[quality]);
}

async function changeFormat(id, format) {
  await API.put('/api/streamer/'+id+'/format', { format });
  showToast('格式已切换为 ' + format.toUpperCase());
}

async function removeStreamer(id, name) {
  if (!confirm('确定删除主播「' + name + '」？')) return;
  const deleteFiles = confirm('是否同时删除「' + name + '」的所有录制视频文件？\n\n「确定」— 删除主播和所有视频\n「取消」— 仅删除主播，保留视频文件');
  const url = '/api/streamer/' + id + (deleteFiles ? '?deleteFiles=true' : '');
  await API.del(url);
  showToast(deleteFiles ? '已删除主播和视频文件' : '已删除主播，视频文件已保留');
  refresh();
}

document.getElementById('btnCheck').addEventListener('click', async () => {
  await API.post('/api/check');
  showToast('已发起检查');
  setTimeout(refresh, 2000);
});

document.getElementById('btnShutdown').addEventListener('click', async () => {
  if (!confirm('确定要关闭录制服务吗？\n\n关闭后将停止所有录制，需重新运行 start.bat 才能恢复。')) return;
  await API.post('/api/shutdown');
  showToast('服务已关闭');
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text2);font-family:var(--font-display);font-size:18px">直播录制助手已关闭<br><br>重新启动请运行 start.bat</div>';
});

document.getElementById('btnAdd').addEventListener('click', async () => {
  const input = document.getElementById('roomInput');
  const val = input.value.trim();
  if (!val) return;
  const r = await API.post('/api/streamer', { roomId: val });
  if (r.error) { showToast(r.error); return; }
  input.value = '';
  showToast('已添加「'+r.name+'」');
  refresh();
});

document.getElementById('roomInput').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('btnAdd').click();
});

document.getElementById('btnSavePath').addEventListener('click', async () => {
  const val = document.getElementById('savePathInput').value.trim();
  if (!val) return;
  await API.put('/api/settings', { savePath: val });
  showToast('保存路径已更新');
});


let highlightData = { highlights: [], availableDates: [] };
let selectedHighlightIds = new Set();

function formatOffset(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ':' + String(s).padStart(2, '0');
}

async function refreshHighlights() {
  const sel = document.getElementById('hlStreamerSelect');
  const dateSel = document.getElementById('hlDateSelect');
  const streamerName = sel.value;
  const date = dateSel.value || new Date().toISOString().slice(0, 10);

  if (!streamerName) {
    document.getElementById('highlightsLabel').style.display = 'none';
    document.getElementById('highlightsList').innerHTML = '';
    return;
  }

  // Lazy-populate streamer dropdown
  if (sel.options.length <= 1) {
    try {
      const statusData = await API.get('/api/status');
      for (const s of statusData.streamers) {
        if ([...sel.options].find(o => o.value === s.name)) continue;
        const opt = document.createElement('option');
        opt.value = s.name;
        opt.textContent = s.name;
        sel.appendChild(opt);
      }
    } catch {}
  }

  try {
    const url = '/api/highlights?streamerName=' + encodeURIComponent(streamerName) + '&date=' + date;
    highlightData = await API.get(url);
  } catch { highlightData = { highlights: [], availableDates: [] }; }

  document.getElementById('highlightsLabel').style.display = '';
  selectedHighlightIds.clear();
  renderHighlightList();
}

function renderHighlightList() {
  const list = document.getElementById('highlightsList');
  const hl = highlightData.highlights || [];

  // Update date dropdown
  const dateSel = document.getElementById('hlDateSelect');
  const dates = highlightData.availableDates || [];
  dateSel.innerHTML = dates.map(d => '<option value="' + d + '">' + d + '</option>').join('');
  if (dates.length === 0) {
    const today = new Date().toISOString().slice(0, 10);
    dateSel.innerHTML = '<option value="' + today + '">' + today + '</option>';
  }

  if (hl.length === 0) {
    list.innerHTML = '<div style="color:var(--text3);font-size:12px;padding:8px 0">暂无高光标注</div>';
    updateClipButton();
    return;
  }

  list.innerHTML = hl.map(h => {
    const tagHTML = (h.triggers || []).map(t => {
      const cls = t === 'danmaku_peak' || t === 'danmaku_super_peak' || t === 'keyword_flood' ? 'tag-danmaku' :
                  t === 'gift_burst' ? 'tag-gift' :
                  t === 'guard_buy' ? 'tag-guard' :
                  t === 'audio_peak' ? 'tag-audio' : '';
      const label = t === 'danmaku_peak' ? '弹幕峰值' :
                    t === 'danmaku_super_peak' ? '超级峰值' :
                    t === 'keyword_flood' ? '关键词刷屏' :
                    t === 'gift_burst' ? '礼物轰炸' :
                    t === 'guard_buy' ? '大航海' :
                    t === 'audio_peak' ? '音频高能' : t;
      return '<span class="tag ' + cls + '">' + label + '</span>';
    }).join('');

    const scoreClass = h.score >= 0.8 ? 'wild' : h.score >= 0.5 ? 'hot' : '';
    const selected = selectedHighlightIds.has(h.id) ? ' selected' : '';
    const clippedBadge = h.clipped ? ' <span style="color:var(--live);font-size:10px">已裁剪</span>' : '';
    const clipLink = h.clipFile ? ' <span style="font-size:10px;color:var(--text3);cursor:pointer" onclick="event.stopPropagation();playFile(\'' + h.clipFile.replace(/\\/g, '\\\\').replace(/'/g, "\\'") + '\')">▶播放</span>' : '';

    return '<div class="hl-item' + selected + '" onclick="toggleHighlight(\'' + h.id + '\', this)">' +
      '<input type="checkbox" class="hl-check" ' + (selected ? 'checked ' : '') + 'onclick="event.stopPropagation();toggleHighlight(\'' + h.id + '\', this.parentElement)" style="pointer-events:auto">' +
      '<div class="hl-info">' +
        '<div class="hl-title">' + formatOffset(h.startOffset) + '–' + formatOffset(h.endOffset) + ' ' + tagHTML + clippedBadge + clipLink + '</div>' +
        '<div class="hl-meta">持续' + Math.round(h.duration) + 's · 弹幕' + (h.danmakuCount || 0) + '条 · 礼物¥' + (h.totalGiftValue || 0) + '</div>' +
      '</div>' +
      '<div class="hl-score ' + scoreClass + '">' + (h.score * 100).toFixed(0) + '%</div>' +
    '</div>';
  }).join('');

  updateClipButton();
}

function toggleHighlight(id, el) {
  if (selectedHighlightIds.has(id)) {
    selectedHighlightIds.delete(id);
    if (el) el.classList.remove('selected');
  } else {
    selectedHighlightIds.add(id);
    if (el) el.classList.add('selected');
  }
  updateClipButton();
}

function updateClipButton() {
  const btn = document.getElementById('btnClipSelected');
  btn.textContent = '裁剪选中 (' + selectedHighlightIds.size + ')';
  btn.disabled = selectedHighlightIds.size === 0;
}

async function clipSelected() {
  if (selectedHighlightIds.size === 0) return;
  const sel = document.getElementById('hlStreamerSelect');
  const dateSel = document.getElementById('hlDateSelect');
  const streamerName = sel.value;
  const date = dateSel.value || new Date().toISOString().slice(0, 10);

  // Find source file from recordings
  let filePath = null;
  try {
    const statusData = await API.get('/api/status');
    const s = statusData.streamers.find(s => s.name === streamerName);
    const recs = (statusData.recordings || []).filter(r => r.streamerId === (s ? s.id : ''));
    if (recs.length > 0) filePath = recs[0].filePath;
  } catch {}
  if (!filePath) { showToast('找不到可用的录制文件'); return; }

  showToast('正在裁剪 ' + selectedHighlightIds.size + ' 个高光片段...');
  try {
    const body = { ids: [...selectedHighlightIds], streamerName, date, filePath };
    const r = await API.post('/api/highlights/clip', body);
    if (r && r.results) {
      const ok = r.results.filter(x => x.ok).length;
      const fail = r.results.filter(x => !x.ok).length;
      showToast('裁剪完成: ' + ok + ' 成功' + (fail > 0 ? ', ' + fail + ' 失败' : ''));
    } else {
      showToast(r.error || '裁剪请求失败');
    }
  } catch (e) {
    showToast('裁剪失败: ' + e.message);
  }
  selectedHighlightIds.clear();
  await refreshHighlights();
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
